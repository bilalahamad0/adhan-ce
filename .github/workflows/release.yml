name: Release (Chrome)

# Builds a signed CRX when a chrome-v*.*.* tag is pushed, attaches it to a draft
# GitHub Release, and (if the CWS secrets are set) submits it to the Chrome Web
# Store. Manual workflow_dispatch runs produce the CRX as an artifact only.
#
# Tag convention (see RELEASING.md): chrome-v* releases to Chrome; firefox-v*
# releases to Firefox/AMO (release-firefox.yml). The bare v* trigger is RETIRED
# — release-tag-guard.yml fails loudly if a bare v* tag is pushed, so the live
# Chrome Web Store can never be hit by an ambiguous tag.
#
# Required repo secret:
#   CRX_PRIVATE_KEY_B64 — base64-encoded contents of adhan-caster-pro-private.pem.
#                         See .github/RELEASE_SETUP.md for one-time setup.

on:
  push:
    tags:
      - 'chrome-v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or commit to build (defaults to current branch HEAD). No release is created on manual dispatch — CRX is uploaded as a workflow artifact only.'
        required: false

permissions:
  contents: write  # needed for the release step to create draft releases

jobs:
  release:
    name: Build & attach CRX
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run jest tests with coverage (enforces thresholds)
        run: npm run test:cov

      - name: Verify tag matches manifest/package/lock versions (tag push only)
        if: startsWith(github.ref, 'refs/tags/chrome-v')
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#chrome-v}"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          LOCK_VERSION="$(node -p "require('./package-lock.json').version")"
          LOCK_PKG_VERSION="$(node -p "require('./package-lock.json').packages[''].version")"
          DRIFT=0
          for v in "$MANIFEST_VERSION" "$PKG_VERSION" "$LOCK_VERSION" "$LOCK_PKG_VERSION"; do
            [ "$TAG_VERSION" = "$v" ] || DRIFT=1
          done
          if [ "$DRIFT" = "1" ]; then
            echo "::error::Version drift — tag=$TAG_VERSION manifest=$MANIFEST_VERSION package=$PKG_VERSION lock=$LOCK_VERSION lock.packages[\"\"]=$LOCK_PKG_VERSION. All four must equal the tag (v2.0.0 shipped with a stale lockfile; this check prevents a repeat)."
            exit 1
          fi
          echo "Tag ↔ manifest/package/lock all match: $TAG_VERSION"

      - name: Compute output paths
        id: ver
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./manifest.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "crx_path=adhan-caster-pro-$VERSION.crx" >> "$GITHUB_OUTPUT"

      - name: Decode private key
        env:
          CRX_PRIVATE_KEY_B64: ${{ secrets.CRX_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${CRX_PRIVATE_KEY_B64:-}" ]; then
            echo "::error::Required secret CRX_PRIVATE_KEY_B64 is not set."
            echo "::error::See .github/RELEASE_SETUP.md to configure it once."
            exit 1
          fi
          printf '%s' "$CRX_PRIVATE_KEY_B64" | base64 -d > key.pem
          chmod 600 key.pem
          # Sanity check: decoded bytes look like a PEM
          if ! head -1 key.pem | grep -q "BEGIN"; then
            echo "::error::Decoded CRX_PRIVATE_KEY_B64 does not look like a PEM file."
            echo "::error::Re-encode with: base64 -i adhan-caster-pro-private.pem | pbcopy"
            exit 1
          fi

      - name: Pack signed CRX
        run: |
          set -euo pipefail
          node scripts/pack-crx.mjs key.pem "${{ steps.ver.outputs.crx_path }}"
          ls -la "${{ steps.ver.outputs.crx_path }}"

      - name: Upload CRX as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.ver.outputs.crx_path }}
          path: ${{ steps.ver.outputs.crx_path }}
          retention-days: 14
          if-no-files-found: error

      - name: Create draft GitHub Release with CRX attached (tag push only)
        if: startsWith(github.ref, 'refs/tags/chrome-v')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.ver.outputs.crx_path }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          name: ${{ github.ref_name }}

      # Upload the signed CRX to the Chrome Web Store and submit it for review.
      # Tag pushes only. No-ops (and leaves the release succeeding) when the
      # OAuth secrets aren't configured, so the build/sign/release pipeline keeps
      # working even before — or without — store automation set up. See
      # .github/RELEASE_SETUP.md → "Automating CWS submission" for the secrets.
      - name: Submit to Chrome Web Store (tag push only)
        if: startsWith(github.ref, 'refs/tags/chrome-v')
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CWS_CLIENT_ID:-}" ] || [ -z "${CWS_CLIENT_SECRET:-}" ] || [ -z "${CWS_REFRESH_TOKEN:-}" ]; then
            echo "::notice::CWS OAuth secrets not set — skipping store submission. The signed CRX is on the GitHub Release; upload it manually, or configure the secrets (see .github/RELEASE_SETUP.md) to automate this."
            exit 0
          fi
          node scripts/submit-cws.mjs "${{ steps.ver.outputs.crx_path }}"

      - name: Wipe private key from runner
        if: always()
        run: rm -f key.pem
