<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Adhan Caster</title>
  </head>
  <body>
    <header class="head">
      <img src="icons/icon48.png" alt="" class="logo" />
      <div class="head-title">
        <strong data-i18n="app_name">Adhan Caster</strong>
        <span id="locLabel" class="loc">—</span>
        <span id="hijriLabel" class="hijri" hidden></span>
      </div>
      <button id="logBtn" class="gear logbtn" title="Prayer log" aria-label="Prayer log" data-i18n-attr="title:prayer_log;aria-label:prayer_log">☑</button>
      <button id="gear" class="gear" title="Settings" aria-label="Settings" data-i18n-attr="title:settings;aria-label:settings">⚙</button>
    </header>

    <section id="pausedBanner" class="paused-banner" hidden>
      <span id="pausedText" data-i18n="media_paused">Media paused</span>
      <span class="banner-actions">
        <button id="focusBtn" class="focus-btn" data-i18n="focus">Focus</button>
        <button id="resumeBtn" class="resume-btn" data-i18n="resume">Resume</button>
      </span>
    </section>

    <section class="next-card">
      <div id="clock" class="clock"></div>
      <div class="next-label" data-i18n="next_prayer">Next prayer</div>
      <div class="next-main">
        <span id="nextName" class="next-name">—</span>
        <span id="nextTime" class="next-time"></span>
      </div>
      <div id="nextCountdown" class="next-countdown"></div>
    </section>

    <section id="list" class="list"></section>

    <section id="settings" class="settings" hidden>
      <label class="field toggle">
        <span data-i18n="enable_caster">Enable Adhan Caster</span>
        <input type="checkbox" id="enabled" />
      </label>
      <label class="field toggle">
        <span data-i18n="focus_fullscreen">Prayer focus fullscreen during Adhan</span>
        <input type="checkbox" id="focusMode" />
      </label>
      <label class="field">
        <span data-i18n="language">Language</span>
        <select id="lang">
          <option value="en">English</option>
          <option value="ar">العربية</option>
          <option value="ur">اردو</option>
          <option value="id">Bahasa Indonesia</option>
          <option value="tr">Türkçe</option>
          <option value="fr">Français</option>
        </select>
      </label>
      <label class="field field-stack">
        <span data-i18n="location">Location</span>
        <span class="city-wrap">
          <input type="text" id="city" placeholder="Search any city…" autocomplete="off" data-i18n-attr="placeholder:city_placeholder" />
          <div id="cityResults" class="suggest" hidden></div>
        </span>
      </label>
      <label class="field">
        <span data-i18n="calc_method">Calculation method</span>
        <select id="method"></select>
      </label>
      <label class="field">
        <span data-i18n="asr_method">Asr (juristic) method</span>
        <select id="school">
          <option value="0" data-i18n="asr_standard">Standard (Shafi, Maliki, Hanbali)</option>
          <option value="1" data-i18n="asr_hanafi">Hanafi</option>
        </select>
      </label>
      <label class="field toggle">
        <span data-i18n="show_hijri">Show Hijri date</span>
        <input type="checkbox" id="showHijri" />
      </label>
      <label class="field">
        <span data-i18n="hijri_adjust">Hijri adjustment</span>
        <select id="hijriOffset">
          <option value="-1">−1</option>
          <option value="0">0</option>
          <option value="1">+1</option>
        </select>
      </label>
      <label class="field">
        <span data-i18n="heads_up">Heads-up before Adhan</span>
        <select id="leadSeconds">
          <option value="15" data-i18n="secs_15">15 sec</option>
          <option value="30" data-i18n="secs_30">30 sec</option>
          <option value="60" data-i18n="secs_60">60 sec</option>
        </select>
      </label>
      <label class="field">
        <span data-i18n="auto_resume_after">Auto-resume after (min)</span>
        <input type="number" id="resumeMin" min="0" max="120" step="1" />
      </label>
      <div class="settings-actions">
        <button id="save" class="save-btn" data-i18n="save">Save</button>
        <span id="saveMsg" class="save-msg"></span>
      </div>
      <div class="dev-row">
        <button id="testBtn" class="test-btn" data-i18n="test_adhan">Run test Adhan (30s)</button>
        <span id="testMsg" class="save-msg"></span>
      </div>
    </section>

    <section id="tracker" class="tracker" hidden>
      <div class="tracker-head">
        <strong data-i18n="prayer_log">Prayer log</strong>
        <span id="trackerStreak" class="tracker-streak"></span>
      </div>
      <div class="cal-nav">
        <button id="calPrev" class="cal-arrow" aria-label="Previous month" data-i18n-attr="aria-label:prev_month">‹</button>
        <span id="calLabel" class="cal-label"></span>
        <button id="calNext" class="cal-arrow" aria-label="Next month" data-i18n-attr="aria-label:next_month">›</button>
      </div>
      <div id="calGrid" class="cal-grid"></div>
      <div class="cal-legend">
        <span data-i18n="cal_less">Less</span>
        <i class="lg lvl-1"></i><i class="lg lvl-2"></i><i class="lg lvl-3"></i><i class="lg lvl-4"></i><i class="lg lvl-5"></i>
        <span data-i18n="cal_more">More</span>
      </div>
      <div id="dayDetail" class="day-detail" hidden>
        <div id="ddDate" class="dd-date"></div>
        <div id="ddPrayers" class="dd-prayers"></div>
      </div>
    </section>

    <footer class="foot">
      <span id="updated"></span>
      <span id="version" class="ver"></span>
      <a href="#" id="refresh" data-i18n="refresh">Refresh</a>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
