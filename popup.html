<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Adhan Caster Pro</title>
  </head>
  <body>
    <header class="head">
      <img src="icons/icon48.png" alt="" class="logo" />
      <div class="head-title">
        <strong>Adhan Caster Pro</strong>
        <span id="locLabel" class="loc">—</span>
      </div>
      <button id="gear" class="gear" title="Settings" aria-label="Settings">⚙</button>
    </header>

    <section id="pausedBanner" class="paused-banner" hidden>
      <span id="pausedText">Media paused</span>
      <span class="banner-actions">
        <button id="focusBtn" class="focus-btn">Focus</button>
        <button id="resumeBtn" class="resume-btn">Resume</button>
      </span>
    </section>

    <section class="next-card">
      <div class="next-label">Next prayer</div>
      <div class="next-main">
        <span id="nextName" class="next-name">—</span>
        <span id="nextTime" class="next-time"></span>
      </div>
      <div id="nextCountdown" class="next-countdown"></div>
    </section>

    <section id="list" class="list"></section>

    <section id="settings" class="settings" hidden>
      <label class="field toggle">
        <span>Enable Adhan Caster</span>
        <input type="checkbox" id="enabled" />
      </label>
      <label class="field toggle">
        <span>Prayer focus fullscreen during Adhan</span>
        <input type="checkbox" id="focusMode" />
      </label>
      <label class="field field-stack">
        <span>Location</span>
        <span class="city-wrap">
          <input type="text" id="city" placeholder="Search any city…" autocomplete="off" />
          <div id="cityResults" class="suggest" hidden></div>
        </span>
      </label>
      <label class="field">
        <span>Heads-up before Adhan</span>
        <select id="leadSeconds">
          <option value="15">15 sec</option>
          <option value="30">30 sec</option>
          <option value="60">60 sec</option>
        </select>
      </label>
      <label class="field">
        <span>Auto-resume after (min)</span>
        <input type="number" id="resumeMin" min="0" max="120" step="1" />
      </label>
      <div class="settings-actions">
        <button id="save" class="save-btn">Save</button>
        <span id="saveMsg" class="save-msg"></span>
      </div>
      <div class="dev-row">
        <button id="testBtn" class="test-btn">Run test Adhan (30s)</button>
        <span id="testMsg" class="save-msg"></span>
      </div>
    </section>

    <footer class="foot">
      <span id="updated"></span>
      <a href="#" id="refresh">Refresh</a>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
